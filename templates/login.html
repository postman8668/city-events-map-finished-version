{% extends "base.html" %}

{% block title %}Вход - Карта событий города{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-sign-in-alt me-2"></i>Вход в систему
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ form_data.username if form_data else '' }}" required maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required maxlength="100">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-1"></i>Войти
                        </button>
                    </div>
                </form>
                
                {% if show_resend and user_email %}
                <hr>
                <div class="alert alert-warning">
                    <p class="mb-2"><i class="fas fa-envelope me-2"></i>Email не подтвержден</p>
                    <form method="POST" action="{{ url_for('resend_confirmation') }}">
                        <input type="hidden" name="email" value="{{ user_email }}">
                        <button type="submit" class="btn btn-sm btn-warning">
                            <i class="fas fa-paper-plane me-1"></i>Отправить повторно
                        </button>
                    </form>
                </div>
                {% endif %}
                
                <hr>
                <div class="text-center">
                    <p class="mb-0">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
